<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Side Panel</title>
    <style>
      :root { color-scheme: light dark; }
      body { margin: 0; font: 14px/1.4 system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
      header { display: flex; gap: 8px; align-items: center; padding: 8px; border-bottom: 1px solid #ddd; }
      select, button { font: inherit; padding: 6px 8px; }
      #warn { color: #a15; padding: 0 8px 8px; font-size: 12px; }
      iframe { width: 100%; height: calc(100vh - 82px); border: 0; }
      #overlay { position: fixed; left: 0; right: 0; bottom: 0; top: 82px; display: none; align-items: center; justify-content: center; background: color-mix(in oklab, Canvas 80%, black 10%); }
      #overlay .box { max-width: 520px; padding: 16px; border: 1px solid #ccc; border-radius: 8px; background: Canvas; box-shadow: 0 4px 16px rgba(0,0,0,.15); }
      #overlay .box h3 { margin: 0 0 8px; font-size: 16px; }
      #overlay .box p { margin: 0 0 12px; font-size: 13px; color: #555; }
      #overlay .box .actions { display: flex; gap: 8px; }
    </style>
  </head>
  <body>
    <header>
      <label for="site">Site:</label>
      <select id="site"></select>
      <button id="manage" title="Manage sites list">Manage Sites</button>
      <button id="openTab" title="Open selected site in a new tab">Open in Tab</button>
    </header>
    <div id="warn">
      Note: Some sites block embedding in iframes. If the panel looks blank, use “Open in Tab”.
    </div>
    <iframe id="frame" referrerpolicy="no-referrer"></iframe>
    <div id="overlay" role="alert" aria-live="polite">
      <div class="box">
        <h3>Site refused to load in the panel</h3>
        <p>This can happen due to X-Frame-Options, Content-Security-Policy, or third‑party cookies being blocked. You can still open the site in a new tab.</p>
        <div class="actions">
          <button id="retry">Retry</button>
          <button id="openTab2">Open in Tab</button>
        </div>
      </div>
    </div>
    <script src="defaults.js"></script>
    <script src="sidepanel.js"></script>
  </body>
  </html>
